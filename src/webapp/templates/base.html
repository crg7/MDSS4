{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CuOOra{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">

  <style>
      /* Reset básico */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
  
      /* Fuente elegante */
      body {
        font-family: 'Montserrat', sans-serif;
        background: #fff;
        color: #333;
        line-height: 1.6;
        min-height: 100vh;
      }
  
      /* Encabezado con fondo azul marino, logo en blanco y distribución en tres columnas */
      header {
        background: #001f3f;
        color: #fff;
        padding: 20px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        opacity: 0;
        transform: translateY(-30px);
        animation: slideInHeader 1s ease-out forwards;
        flex-wrap: wrap;
      }
  
      .logo {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #fff;
      }
  
      /* Área central: desplegable a la izquierda y botones Topics y Users */
      .header-center {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin: 10px 0;
      }
  
      .recommender-bar {
        display: flex;
        align-items: center;
        gap: 10px;
      }
  
      .recommender-bar select {
        padding: 10px 15px;
        font-size: 14px;
        border-radius: 50px;
        border: 1px solid #ddd;
        background-color: #e7e7e7;
        color: #333;
        cursor: pointer;
        transition: background 0.3s ease;
      }
  
      .recommender-bar select:hover {
        background-color: #d4d4d4;
      }
  
      .recommender-bar button {
        padding: 10px 20px;
        font-size: 14px;
        border-radius: 50px;
        border: 1px solid #ddd;
        background-color: #e7e7e7;
        color: #333;
        cursor: pointer;
        transition: background 0.3s ease;
      }
  
      .recommender-bar button:hover {
        background-color: #d4d4d4;
      }
  
      /* Área derecha: botón Add Question y nombre de usuario */
      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }
  
      .add-question-btn {
        background-color: #2A74D7;
        color: white;
        padding: 15px 25px;
        font-size: 16px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: background 0.3s ease, transform 0.3s ease;
      }
  
      .add-question-btn:hover {
        background-color: #2169b0;
        transform: scale(1.05);
      }
  
      .user {
        background-color: #D5006D;
        padding: 8px 15px;
        border-radius: 50px;
        color: #fff;
        font-weight: 600;
        font-size: 16px;
      }
  
      /* Main Section */
      main {
        padding: 40px 20px;
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInMain 1s ease-out forwards;
        animation-delay: 0.5s;
      }
  
      /* Título de la lista de preguntas */
      .question-list h2 {
        font-size: 28px;
        font-weight: 700;
        color: #003366;
        margin-bottom: 30px;
        text-align: center;
      }
  
      /* Tarjetas de preguntas con animación de movimiento al pasar el ratón */
      .question-card {
        background-color: #f9f9f9;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 25px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        transition: transform 0.4s ease, box-shadow 0.4s ease;
        opacity: 0;
        transform: translateY(20px);
        animation: slideInCard 1s ease-out forwards;
      }
  
      .question-card:hover {
        transform: translateY(-15px) scale(1.03);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      }
  
      .question-card:nth-child(1) {
        animation-delay: 0.7s;
      }
  
      .question-card:nth-child(2) {
        animation-delay: 1s;
      }
  
      .question-card:nth-child(3) {
        animation-delay: 1.3s;
      }
  
      .question-footer {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
        font-size: 14px;
        color: #555;
      }
  
      /* Animaciones */
      @keyframes slideInHeader {
        0% {
          opacity: 0;
          transform: translateY(-30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
  
      @keyframes fadeInMain {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
  
      @keyframes slideInCard {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
  
      /* Popup sin fondo oscuro */
      .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: none;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }
  
      .popup-content {
        position: relative;
        background-color: #fff;
        padding: 30px 20px 20px;
        border-radius: 8px;
        width: 400px;
        max-width: 100%;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        animation: popupShow 0.5s ease-in-out;
      }
  
      .popup-content h3 {
        color: #2A74D7;
        font-size: 22px;
        margin-bottom: 20px;
        text-align: center;
      }
  
      .popup-content label {
        font-size: 16px;
        margin-bottom: 8px;
        display: block;
      }
  
      .popup-content input,
      .popup-content textarea,
      .popup-content select {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ddd;
        font-size: 16px;
      }
  
      .popup-content button[type="submit"] {
        background-color: #D5006D;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s ease;
        display: block;
        margin: 0 auto;
      }
  
      .popup-content button[type="submit"]:hover {
        background-color: #e30b6c;
      }
  
      /* Botón de cierre dentro de la ventana */
      .close-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 24px;
        color: #555;
        cursor: pointer;
        transition: color 0.3s ease;
      }
  
      .close-btn:hover {
        color: #D5006D;
      }
  
      @keyframes popupShow {
        0% {
          opacity: 0;
          transform: scale(0.8);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
  </style>
</head>
<body>
  <header>
    <div class="logo">✨ CuOOra</div>
    <div class="header-center">
      <div class="recommender-bar">
        <select class="recommender-select">
          <option value="social">🌐 Social</option>
          <option value="topics">🎯 Tópicos</option>
          <option value="popular">🔥 Populares</option>
          <option value="news">🆕 Novedades</option>
        </select>
      </div>
    </div>
    <div class="header-right">
      <button class="add-question-btn" onclick="openPopup()">➕ Add Question</button>
      <div class="user">😊 {{ request.user.username|default:"Invitado" }}</div>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Popup Añadir Pregunta -->
  <div class="popup" id="questionPopup">
    <div class="popup-content">
      <span class="close-btn" onclick="closePopup()">×</span>
      <h3>Añadir Nueva Pregunta ✍️</h3>
      <form method="post" action="{% url 'add_inquiry' %}">
        {% csrf_token %}
        <label for="title">Título</label>
        <input type="text" id="title" name="title" required placeholder="Tu pregunta">
        <label for="description">Descripción</label>
        <textarea id="description" name="description" rows="4" required placeholder="Detalles"></textarea>
        <button type="submit">Enviar 🚀</button>
      </form>
    </div>
  </div>

  <script>
    function openPopup(){
      document.getElementById('questionPopup').style.display='flex';
    }
    function closePopup(){
      document.getElementById('questionPopup').style.display='none';
    }
    // Navegación del select
    document.querySelector('.recommender-select').addEventListener('change',function(){
      const map = { social:'/social/', topics:'/topics/', popular:'/popular/', news:'/news/' };
      window.location.href = map[this.value];
    });
  </script>
</body>
</html>
